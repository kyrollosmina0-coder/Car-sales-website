<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cars - Car Sales Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="index.html">CarSales</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <div class="navbar-nav ms-auto">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link active" href="cars.html">Cars</a>
          <a class="nav-link" href="review.html">Review</a>
        </div>
      </div>
    </div>
  </nav>

  <section class="page-section dark-section full-page">
    <div class="container">
      <h2>Available Cars</h2>

      <div class="buyer-box card shadow">
        <div class="card-body">
          <label for="buyerName" class="form-label fw-bold">Buyer Name</label>
          <input id="buyerName" class="form-control" type="text" placeholder="Enter buyer name">
        </div>
      </div>

      <div id="carsRoot"></div>
    </div>
  </section>

  <div id="receiptBox" class="modal">
    <div class="modal-content card shadow-lg">
      <div class="card-body">
        <h2>Receipt</h2>
        <p><strong>Buyer:</strong> <span id="receiptBuyer"></span></p>
        <p><strong>Car:</strong> <span id="receiptCar"></span></p>
        <p><strong>Price:</strong> <span id="receiptPrice"></span></p>
        <div class="modal-buttons d-flex gap-2">
          <button class="btn btn-primary" onclick="savePurchase('Yes I was paid')">Yes I was paid</button>
          <button class="not-paid btn btn-secondary" onclick="savePurchase('Not yet')">Not yet</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p id="reactFooter">Car Sales Website Project</p>
  </footer>

  <script src="script.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="react-components.js"></script>
</body>
</html>
